<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Hydro Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">

<span class="navbar-brand mb-0 h1">

⚡ Micro Hydro Monitoring System

</span>

</div>
</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Voltage</h5>

<h2 id="voltage">0.00 V</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Current</h5>

<h2 id="current">0.00 A</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Power</h5>

<h2 id="power">0.00 W</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Energy</h5>

<h2 id="energy">0.000 kWh</h2>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h4>Status</h4>

<h3 id="status" class="text-danger">

Offline

</h3>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h4>Last Update</h4>

<h3 id="lastUpdate">

--

</h3>

</div>

</div>

</div>

</div>

<div class="text-center mt-5">

<a href="history.html" class="btn btn-success btn-lg">

View History

</a>

</div>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
